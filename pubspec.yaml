name: hamadasiana
description: Hamada Siana clean client app
publish_to: "none"

version: 2.0.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  socket_io_client: ^3.1.4
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_local_notifications: ^20.1.0
  flutter_ringtone_player: ^4.0.0+4
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.20.3
  build_runner: ^2.4.12

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: assets/app_icon.png
